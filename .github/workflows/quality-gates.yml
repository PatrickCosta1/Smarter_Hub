name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend-quality:
    name: Frontend Build + Budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend quality gate
        run: npm run quality:frontend

  backend-quality:
    name: Backend Build + Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Backend quality gate
        run: npm run quality:backend

      - name: Backend unit tests
        run: npm run quality:backend:tests
