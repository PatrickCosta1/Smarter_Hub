databases:
  - name: smarter-hub-postgres
    plan: free
    region: frankfurt
    databaseName: smarter_hub
    user: smarter_hub_user

services:
  - type: web
    name: smarter-hub-api
    runtime: node
    rootDir: backend
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smarter-hub-postgres
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
