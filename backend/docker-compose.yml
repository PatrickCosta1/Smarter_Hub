services:
  postgres:
    image: postgres:16-alpine
    container_name: smarter_hub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smarter_hub
    ports:
      - "5432:5432"
    volumes:
      - smarter_hub_pg_data:/var/lib/postgresql/data

volumes:
  smarter_hub_pg_data:
